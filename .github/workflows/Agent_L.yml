name: Agent L - Corporate Loan Engine

on:
  schedule:
    - cron: '00 12 * * *' # Runs every day
  workflow_dispatch:

jobs:
  execute_loan_hunting:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-genai pydantic

      - name: Run Agent L Direct Client Engine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN_L: ${{ secrets.TELEGRAM_BOT_TOKEN_L }}
          TELEGRAM_CHAT_ID_L: ${{ secrets.TELEGRAM_CHAT_ID_L }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
        run: python Agent_L_Direct.py
