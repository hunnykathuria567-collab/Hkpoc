name: Agent1000 L - Corporate Loan Engine

on:
  schedule:
    # Runs at 12:00 PM UTC daily
    - cron: '00 12 * * *'
  workflow_dispatch:

jobs:
  execute_loan_hunting:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Added pandas and openpyxl for the Excel/Bulk strategy
          pip install requests google-genai pydantic pandas openpyxl

      - name: Run Agent L Direct Client Engine
        env:
          # Using your standard Homologation secrets for phone delivery
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
        # Ensure this matches the filename of your Python script
        run: python Agent_L_1000.py

      - name: Rescue the Master Database (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: Agent-L-StrikeTeam-Master
          path: Agent_L_Master.xlsx
          retention-days: 90
