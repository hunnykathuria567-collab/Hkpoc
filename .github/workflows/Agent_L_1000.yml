name: Agent P Intelligence Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows you to manually trigger it from the GitHub app

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests openpyxl google-generativeai

      - name: Run Agent P Intelligence Script
        env:
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python Agent_L_1000.py

      - name: Rescue the Master Database (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: Agent-L-StrikeTeam-Master
          path: Agent_L_Master.xlsx
          retention-days: 90
