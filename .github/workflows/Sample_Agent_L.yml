name: Agent L - Corporate Loan Engine

on:
  schedule:
    - cron: '00 12 * * *'
  workflow_dispatch:

jobs:
  execute_loan_hunting:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-genai pydantic

      - name: Run Agent L Direct Client Engine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # CHANGED: Now using your main Agent P credentials so it routes to your phone
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
        run: python Agent_L_Direct.py

      - name: Rescue the Master Database (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: Agent-L-Corporate-Loans-Database
          path: Agent_L_Corporate_Loans.csv
          retention-days: 90
